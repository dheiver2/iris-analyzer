<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Iris Analyzer</title>
<style>
  :root{--bg:#0b0b0c;--card:#121214;--border:#222226;--txt:#ededed;--muted:#7a7a7e;--accent:#fff}
  *{box-sizing:border-box;margin:0;padding:0}
  body{background:var(--bg);color:var(--txt);font-family:-apple-system,"Helvetica Neue",Arial,sans-serif}
  header{border-bottom:1px solid var(--border);padding:0 28px;height:64px;display:flex;align-items:center;gap:14px}
  .logo{font-weight:700;letter-spacing:2px;font-size:16px}.dot{color:var(--accent)}
  .sub{color:var(--muted);font-size:11px;letter-spacing:.5px}
  main{display:flex;gap:28px;padding:24px 28px;flex-wrap:wrap}
  .col{flex:1;min-width:360px}
  video,#preview{width:100%;border:1px solid var(--border);border-radius:12px;background:#000;aspect-ratio:4/3;object-fit:cover}
  .row{display:flex;gap:12px;margin-top:14px}
  button{flex:1;border:1px solid var(--border);border-radius:10px;padding:12px;font-size:13px;font-weight:600;cursor:pointer;background:transparent;color:var(--txt)}
  button.primary{background:var(--accent);color:#000;border-color:var(--accent)}
  button:disabled{opacity:.4;cursor:default}
  .grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px}
  .grid input,.grid input.full{background:#141416;border:1px solid var(--border);border-radius:8px;padding:8px;color:var(--txt);font-size:13px}
  label{font-size:10px;color:var(--muted);letter-spacing:.5px;text-transform:uppercase}
  .resumo{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:14px;font-size:13px}
  .card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px;margin-bottom:16px}
  .card h3{font-size:12px;letter-spacing:1px;margin-bottom:12px}
  .imgs{display:flex;gap:10px;flex-wrap:wrap}.imgs figure{flex:1;min-width:110px;text-align:center}
  .imgs img{width:100%;border:1px solid var(--border);border-radius:8px;background:#000}
  .imgs figcaption{font-size:9px;color:var(--muted);letter-spacing:.5px;margin-top:4px}
  .met{font-size:12px;line-height:1.7;margin-top:10px}.muted{color:var(--muted)}
  .aviso{color:#f0c060}.ok{color:#5b8}
  .disc{border-top:1px solid var(--border);color:var(--muted);font-size:10px;padding:10px 28px}
</style>
</head>
<body>
<header>
  <span class="logo"><span class="dot">●</span>&nbsp; IRIS ANALYZER</span>
  <span class="sub">análise de imagem da íris · bem-estar</span>
</header>
<main>
  <div class="col">
    <video id="cam" autoplay playsinline muted></video>
    <canvas id="cv" style="display:none"></canvas>
    <div class="row">
      <button id="btnCap" class="primary">Capturar e analisar</button>
      <button id="btnPdf" disabled>Gerar laudo PDF</button>
    </div>
    <div class="grid">
      <div><label>Nome do cliente</label><input id="nome"></div>
      <div><label>Idade</label><input id="idade"></div>
      <div><label>Profissional</label><input id="prof"></div>
      <div><label>Data</label><input id="data"></div>
    </div>
    <div style="margin-top:10px"><label>Observações</label>
      <input id="obs" class="full" style="width:100%"></div>
  </div>
  <div class="col">
    <div id="resultados"><p class="muted">Capture para ver a análise.</p></div>
  </div>
</main>
<div class="disc">Ferramenta de bem-estar e análise de imagem. Não é diagnóstico médico —
a iridologia não tem validação científica para diagnóstico.</div>

<script>
const cam=document.getElementById('cam'), cv=document.getElementById('cv');
const btnCap=document.getElementById('btnCap'), btnPdf=document.getElementById('btnPdf');
const res=document.getElementById('resultados');
document.getElementById('data').value=new Date().toLocaleDateString('pt-BR');
let ultimoBlob=null;

async function iniciarCamera(){
  try{
    const s=await navigator.mediaDevices.getUserMedia({video:{width:{ideal:1920},height:{ideal:1080},facingMode:'user'}});
    cam.srcObject=s;
  }catch(e){ res.innerHTML='<p class="aviso">Não foi possível acessar a câmera: '+e.message+'</p>'; }
}
iniciarCamera();

function capturarBlob(){
  cv.width=cam.videoWidth; cv.height=cam.videoHeight;
  cv.getContext('2d').drawImage(cam,0,0);
  return new Promise(r=>cv.toBlob(r,'image/jpeg',0.92));
}

btnCap.onclick=async()=>{
  btnCap.disabled=true; btnCap.textContent='Analisando…';
  try{
    ultimoBlob=await capturarBlob();
    const fd=new FormData(); fd.append('imagem',ultimoBlob,'frame.jpg');
    const r=await fetch('/analisar',{method:'POST',body:fd});
    const d=await r.json();
    render(d);
    btnPdf.disabled=!d.ok;
  }catch(e){ res.innerHTML='<p class="aviso">Erro: '+e.message+'</p>'; }
  btnCap.disabled=false; btnCap.textContent='Capturar e analisar';
};

btnPdf.onclick=async()=>{
  if(!ultimoBlob) return;
  const fd=new FormData();
  fd.append('imagem',ultimoBlob,'frame.jpg');
  fd.append('nome',nome.value); fd.append('idade',idade.value);
  fd.append('profissional',prof.value); fd.append('data',data.value);
  fd.append('observacoes',obs.value);
  const r=await fetch('/laudo',{method:'POST',body:fd});
  const b=await r.blob(); const u=URL.createObjectURL(b);
  const a=document.createElement('a'); a.href=u; a.download='laudo.pdf'; a.click();
};

function render(d){
  if(!d.ok){ res.innerHTML='<p class="aviso">'+(d.erro||'Falha na análise.')+'</p>'; return; }
  let h='<div class="resumo"><b>Índice de confiança: '+d.confianca+'/100</b>';
  if(d.comparacao) h+='<br><span class="muted">'+d.comparacao+'</span>';
  if(d.avisos&&d.avisos.length) h+='<br><span class="aviso">⚠ '+d.avisos.join('<br>⚠ ')+'</span>';
  else h+='<br><span class="ok">✔ Sem alertas de plausibilidade.</span>';
  h+='</div>';
  for(const o of d.olhos){
    h+='<div class="card"><h3>OLHO '+o.lado.toUpperCase()+'</h3><div class="imgs">'+
      '<figure><img src="'+o.zoom+'"><figcaption>ÍRIS</figcaption></figure>'+
      '<figure><img src="'+o.heatmap+'"><figcaption>MAPA DE CALOR</figcaption></figure>'+
      '<figure><img src="'+o.mapa+'"><figcaption>ZONAS</figcaption></figure></div>'+
      '<div class="met"><b>Zonas em destaque</b> (tradicional, sem valor diagnóstico):<br>'+
      o.zonas.map(z=>'• '+z).join('<br>')+
      '<br><b>Qualidade:</b> '+o.qualidade+'<br><span class="muted">'+o.fatores+'</span>'+
      '<br><b>Biometria:</b> '+o.biometria+
      '<br><b>Cor:</b> '+o.cor+' · <b>Trama:</b> '+o.trama+' · <b>Constituição:</b> '+o.constituicao+
      '</div></div>';
  }
  res.innerHTML=h;
}
</script>
</body>
</html>
